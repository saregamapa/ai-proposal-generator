services:
  - type: web
    name: proposal-api
    runtime: node
    rootDir: backend
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: proposal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: proposal-redis
          type: keyvalue
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_AGENCY_PRICE_ID
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@aiproposal.io
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
  - type: web
    name: proposal-frontend
    runtime: node
    rootDir: frontend
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
  - type: keyvalue
    name: proposal-redis
    region: oregon
    plan: starter
    ipAllowList: []  # internal only; API and other services in same region connect via connectionString

databases:
  - name: proposal-db
    databaseName: proposal_db
    user: proposal_user
    region: oregon
    plan: starter
